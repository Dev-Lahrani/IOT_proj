[env:esp32controller]
platform        = espressif32
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
upload_speed    = 921600

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.3

build_flags =
    -O2
    -DCONFIG_IDF_TARGET_ESP32

monitor_filters =
    colorize
    log2file

# Port is auto-detected. Override with --upload-port /dev/ttyUSB0 if needed.
